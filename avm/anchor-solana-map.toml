# Recommended Solana CLI versions for Anchor releases.
#
# The entries are release floors. AVM resolves an Anchor version by choosing the
# last entry whose `anchor` version is <= the requested Anchor version.
#
# Sources:
# - docs/content/docs/updates/release-notes/* "Recommended Solana Version"
# - docs/content/docs/references/anchor-toml.mdx for the current release
[[entries]]
anchor = "0.29.0"
# Anchor 0.29.0 recommended Solana 1.17.0, but Anza's release bucket no
# longer hosts v1.17.0/install. Keep this on the earliest hosted 1.17.x.
solana = "1.17.25"

[[entries]]
anchor = "0.30.0"
solana = "1.18.8"

[[entries]]
anchor = "0.30.1"
solana = "1.18.17"

[[entries]]
anchor = "0.31.0"
solana = "2.1.0"

[[entries]]
anchor = "0.31.1"
solana = "2.1.0"

[[entries]]
anchor = "0.32.0"
solana = "2.3.0"

[[entries]]
anchor = "0.32.1"
solana = "2.3.0"

[[entries]]
anchor = "1.0.0"
solana = "3.1.10"

[[entries]]
anchor = "1.0.1"
solana = "3.1.10"

[[entries]]
anchor = "1.0.2"
solana = "3.1.10"
