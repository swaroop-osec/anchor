name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+-*"

concurrency:
  group: release
  cancel-in-progress: false

env:
  DIST: dist-${{ github.ref_name }}

jobs:
  verify-tag:
    name: Verify tag
    runs-on: ubuntu-latest
    permissions:
      contents: read
    environment:
      name: release
    # inspired by Caddy's release process: https://github.com/caddyserver/caddy/blob/987375297862d9cd0a3fa33cfb199c25e504ad1b/.github/workflows/release.yml#L29C1-L143C54
    outputs:
      verification_passed: ${{ steps.verify.outputs.passed }}
      tag_version: ${{ steps.info.outputs.version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Force fetch upstream tags
        run: git fetch --tags --force

      - name: Get tag info
        id: info
        run: |
          echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          echo "version_tag=${GITHUB_REF/refs\/tags\//}" >> $GITHUB_OUTPUT
          echo "sha=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT

      - name: Validate commits and tag signatures
        id: verify
        env:
          RELEASE_MANAGERS: ${{ vars.RELEASE_MANAGERS }}
          VERSION_TAG: ${{ steps.info.outputs.version_tag }}
        run: |
          if [ -z "${RELEASE_MANAGERS}" ]; then
            echo "RELEASE_MANAGERS variable is not set"
            echo "passed=false" >> $GITHUB_OUTPUT
            exit 1
          fi

          IFS=',' read -ra rms <<< "${RELEASE_MANAGERS}"
          for u in "${rms[@]}"; do
            curl -fsSL "https://github.com/${u}.gpg" | gpg --batch --import >/dev/null
          done

          echo "Verifying the tag: ${VERSION_TAG}"
          if ! git verify-tag -v "${VERSION_TAG}" 2>&1; then
            echo "❌ Tag verification failed!"
            echo "passed=false" >> $GITHUB_OUTPUT
            exit 1
          fi
          # Run it again to capture the output
          git verify-tag -v "${VERSION_TAG}" 2>&1 | tee /tmp/verify-output.txt;

          # SSH verification output typically includes the key fingerprint
          # Use GNU grep with Perl regex for cleaner extraction (Linux environment)
          KEY_SHA256=$(grep -oP "SHA256:[\"']?\K[A-Za-z0-9+/=]+(?=[\"']?)" /tmp/verify-output.txt | head -1 || echo "")

          if [ -z "$KEY_SHA256" ]; then
            # Try alternative pattern with "key" prefix
            KEY_SHA256=$(grep -oP "key SHA256:[\"']?\K[A-Za-z0-9+/=]+(?=[\"']?)" /tmp/verify-output.txt | head -1 || echo "")
          fi

          if [ -z "$KEY_SHA256" ]; then
            # Fallback: extract any base64-like string (40+ chars)
            KEY_SHA256=$(grep -oP '[A-Za-z0-9+/]{40,}=?' /tmp/verify-output.txt | head -1 || echo "")
          fi

          if [ -z "$KEY_SHA256" ]; then
            echo "Somehow could not extract SSH key fingerprint from git verify-tag output"
            echo "passed=false" >> $GITHUB_OUTPUT
            exit 1
          fi

          echo "✅ Tag verification succeeded!"
          echo "passed=true" >> $GITHUB_OUTPUT
          echo "key_id=$KEY_SHA256" >> $GITHUB_OUTPUT

      - name: Summary
        env:
          VERSION: ${{ steps.info.outputs.version }}
          SHA: ${{ steps.info.outputs.sha }}
          KEY_ID: ${{ steps.verify.outputs.key_id }}
        run: |
          echo "## Tag Verification Summary 🔐" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Tag:** ${VERSION}" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit:** ${SHA}" >> $GITHUB_STEP_SUMMARY
          echo "- **Signature:** ✅ Verified" >> $GITHUB_STEP_SUMMARY
          echo "- **Signed by:** ${KEY_ID}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Proceeding with release build..." >> $GITHUB_STEP_SUMMARY

  publish-crates:
    name: Publish crates
    runs-on: ubuntu-latest
    needs: verify-tag
    if: ${{ needs.verify-tag.outputs.verification_passed == 'true' }}
    permissions:
      contents: read
      id-token: write
      attestations: write
      artifact-metadata: write
    environment:
      name: release
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          # FIXME: https://github.com/rust-lang/cargo/issues/17093
          # Stable cargo has a publishing bug. Switch back to stable when the fix is out
          toolchain: nightly

      - name: Install cargo-release
        run: cargo install cargo-release --version 1.1.1 --locked

      - name: Authenticate with crates.io
        id: auth
        uses: rust-lang/crates-io-auth-action@b7e9a28eded4986ec6b1fa40eeee8f8f165559ec # v1.0.3

      - name: Publish crates
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
        run: |
          set -xeuo pipefail

          echo "Publishing crates"
          out_file=$(mktemp)
          if cargo release publish --workspace --allow-branch "*" --no-confirm --execute 2>&1 | tee "$out_file"; then
            exit 0
          fi
          # cargo-release 1.1.1 exits non-zero with "no packages selected" when every
          # workspace crate is skipped due to a previous publish. Treat that as success.
          if grep -q "no packages selected" "$out_file" \
             && grep -q "disabled due to previous publish" "$out_file"; then
            echo "All crates already published at current versions; nothing to do."
            exit 0
          fi
          exit 1

      - name: Check for crate artifacts
        id: crate-artifacts
        if: ${{ !inputs.dry_run }}
        run: |
          shopt -s nullglob
          files=(target/package/*.crate)
          if [ ${#files[@]} -gt 0 ]; then
            echo "found=true" >> "$GITHUB_OUTPUT"
            cd target/package
            sha256sum *.crate > SHA256SUMS
            echo "--- Crate checksums ---"
            cat SHA256SUMS
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Attest crate checksum manifest
        uses: actions/attest-build-provenance@96278af6caaf10aea03fd8d33a09a777ca52d62f # v3.2.0
        if: ${{ !inputs.dry_run && steps.crate-artifacts.outputs.found == 'true' }}
        with:
          subject-path: target/package/SHA256SUMS

      - uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        if: ${{ !inputs.dry_run && steps.crate-artifacts.outputs.found == 'true' }}
        with:
          if-no-files-found: ignore
          name: published-crates
          path: |
            target/package/*.crate
            target/package/SHA256SUMS

  publish-npmjs:
    name: Publish npmjs packages
    runs-on: ubuntu-latest
    needs: verify-tag
    if: ${{ needs.verify-tag.outputs.verification_passed == 'true' }}
    permissions:
      contents: read
      id-token: write
    environment:
      name: release
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
          package-manager-cache: false

      - name: Enable corepack (yarn)
        run: corepack enable

      - name: Publish npmjs packages
        env:
          DRY_RUN: "false"
        run: bash .github/scripts/publish-npmjs.sh

  publish-container-image:
    name: Publish Docker image to Container Registry
    runs-on: ubuntu-latest
    needs: [verify-tag, publish-crates]
    if: ${{ needs.verify-tag.outputs.verification_passed == 'true' }}
    permissions:
      contents: read
      id-token: write
      attestations: write
      artifact-metadata: write
    environment:
      name: release
    env:
      IMAGE_NAME: quay.io/ottersec/anchor
      ROBOT_ACCOUNT: ottersec+anchor_releases_github
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Exchange GitHub OIDC token for Quay robot token
        run: |
          set -euo pipefail
          OIDC_TOKEN=$(curl --silent --fail \
            --header "Authorization: bearer ${ACTIONS_ID_TOKEN_REQUEST_TOKEN}" \
            "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=quay.io" | jq -r '.value')
          [ -n "${OIDC_TOKEN}" ] || { echo "Failed to obtain OIDC token" >&2; exit 1; }
          QUAY_TOKEN=$(curl --silent --fail \
            --user "${ROBOT_ACCOUNT}:${OIDC_TOKEN}" \
            "https://quay.io/oauth2/federation/robot/token" | jq -r '.token')
          [ -n "${QUAY_TOKEN}" ] || { echo "Failed to exchange token with Quay" >&2; exit 1; }
          echo "::add-mask::${QUAY_TOKEN}"
          echo "QUAY_TOKEN=${QUAY_TOKEN}" >> "${GITHUB_ENV}"

      - name: Login to Quay.io
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          registry: quay.io
          username: ${{ env.ROBOT_ACCOUNT }}
          password: ${{ env.QUAY_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5.10.0
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=tag
            type=sha

      - name: Build and push
        id: build
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2
        with:
          context: docker/build
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            SOLANA_CLI=v3.1.10
            ANCHOR_CLI=${{ github.ref_name }}
          provenance: mode=max
          sbom: true

      - name: Attest build provenance
        uses: actions/attest-build-provenance@96278af6caaf10aea03fd8d33a09a777ca52d62f # v3.2.0
        id: attest
        with:
          subject-name: ${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: false # provenance: mode=max above already pushes it to Quay.io

  build-cli:
    name: Build binaries
    needs: verify-tag
    if: ${{ needs.verify-tag.outputs.verification_passed == 'true' }}
    uses: ./.github/workflows/build-cli.yaml
    permissions:
      contents: read
      id-token: write
      attestations: write
    with:
      dry_run: false
      dist: dist-${{ github.ref_name }}

  upload-cli:
    name: Upload binaries to release
    runs-on: ubuntu-latest
    needs: [verify-tag, build-cli]
    permissions:
      contents: write
    if: ${{ needs.verify-tag.outputs.verification_passed == 'true' }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          pattern: anchor-*
          path: ${{ env.DIST }}

      - name: Upload
        shell: bash
        run: |
          set -euo pipefail

          publish_args=()
          # If version looks like vX.Y.Z-<something> (e.g. v1.0.0-rc.2), publish as a pre-release
          if [[ "$GITHUB_REF_NAME" =~ ^v[0-9]+\.[0-9]+\.[0-9]+-.+ ]]; then
            publish_args+=(--prerelease)

            # avm's older versions do not filter out pre-releases, meaning that
            # if we were to create a pre-release, this would change the default
            # version installed for new users
            echo "Skipping creating GitHub release for a pre-release."
            exit 0
          fi

          # TODO: if we end up publishing pre-releases as well, we will need to update the parsing below
          RELEASE_URL=$(echo $GITHUB_REF_NAME | sed 's/\./-/g' | sed 's/^v//')
          RELEASE_CHANGELOG="$(echo $GITHUB_REF_NAME | sed 's/\.//g' | sed 's/^v//')---$(date '+%Y-%m-%d')"
          GH_TOKEN=${{ secrets.GITHUB_TOKEN }} gh release create $GITHUB_REF_NAME $DIST/*/* \
            --title "$GITHUB_REF_NAME" \
            --notes "$(cat <<EOF
          The $GITHUB_REF_NAME release is here.

          Check out the release notes from [Anchor website](https://www.anchor-lang.com/docs/updates/release-notes/${RELEASE_URL}) or [GitHub](https://github.com/solana-foundation/anchor/blob/${GITHUB_REF_NAME}/docs/content/docs/updates/release-notes/${RELEASE_URL}.mdx).

          For a list of notable changes with their associated PRs, see the [CHANGELOG](https://github.com/solana-foundation/anchor/blob/${GITHUB_REF_NAME}/CHANGELOG.md#${RELEASE_CHANGELOG}).
          EOF
          )" \
            "${publish_args[@]}"

  publish-cli:
    name: Publish CLI onto npmjs
    runs-on: ubuntu-latest
    needs: [verify-tag, build-cli]
    if: ${{ needs.verify-tag.outputs.verification_passed == 'true' }}
    permissions:
      id-token: write
      contents: read
    environment:
      name: release
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
          package-manager-cache: false

      - name: Enable corepack (yarn)
        run: corepack enable

      - uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          pattern: anchor-*
          path: ${{ env.DIST }}

      - run: |
          set -xeuo pipefail

          cp "$DIST"/anchor-*-x86_64-unknown-linux-gnu/anchor-*-x86_64-unknown-linux-gnu cli/npm-package/anchor
          cd cli/npm-package/
          chmod +x anchor

          name="$(node -p "require('./package.json').name")"
          version="$(node -p "require('./package.json').version")"

          latest="$(npm view "$name" dist-tags.latest 2>/dev/null || true)"
          major_minor="$(node -p "require('./package.json').version.split('.').slice(0,2).join('.')")"

          publish_args=()
          # If version looks like X.Y.Z-<something> (e.g. 1.0.0-rc.2), publish under dist-tag "next"
          if [[ "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+-.+ ]]; then
            publish_args+=(--tag next)
          # If we are releasing a backport, then we need to explicitly specify --tag as it can't be latest
          elif [[ -n "$latest" ]] && [[ "$version" != "$latest" ]] &&
            [[ "$(printf '%s\n%s\n' "$version" "$latest" | sort -V | tail -n1)" == "$latest" ]]; then
            publish_args+=(--tag "back-$major_minor")
          fi

          echo "Publishing CLI"
          npm publish "${publish_args[@]}" --provenance --access public
