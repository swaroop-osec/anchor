name: No Caching Tests

# Legacy v1 full-suite test pipeline. Disabled — the anchor-next branch
# tests only the v2 stack via `tests.yaml`. Left in the tree (manual
# trigger only) so a future v1 release branch can re-enable it without
# rebuilding the reusable workflow wiring.
on:
  workflow_dispatch:

jobs:
  no-caching-tests:
    name: Reusable
    uses: ./.github/workflows/reusable-tests.yaml
    with:
      cache: false
      solana_version: 3.1.10
      node_version: 20.18.0
      cargo_profile: release
      anchor_binary_name: anchor-binary-no-caching
      surfpool_cli_version: 1.2.0
